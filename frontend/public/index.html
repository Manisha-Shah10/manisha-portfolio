    <!-- Prevent PerformanceServerTiming Error -->
    <script>
        window.addEventListener(
            "error",
            function (e) {
                if (
                    e.error instanceof DOMException &&
                    e.error.name === "DataCloneError"
                ) {
                    e.stopImmediatePropagation();
                    e.preventDefault();
                }
            },
            true
        );
    </script>
